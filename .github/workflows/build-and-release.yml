name: build-and-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wasm:
    name: wasm
    runs-on: ubuntu-latest
    env:
      EMSCRIPTEN_ALLOW_NEWER_PYTHON: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            bison \
            flex \
            git \
            rsync \
            libeigen3-dev \
            libboost-dev

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Pinned (not "latest") so the emsdk action cache stays warm across runs.
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Configure and build
        run: |
          set -euo pipefail
          # BOOST_ROOT=/usr makes Boost_INCLUDE_DIR=/usr/include. Passing -I/usr/include
          # into em++ pulls the host glibc stdint.h before the Emscripten sysroot and
          # breaks with: bits/libc-header-start.h not found. Isolate boost/eigen3 only.
          WASM_CI_DEPS="${RUNNER_TEMP}/wasm-ci-deps"
          mkdir -p "${WASM_CI_DEPS}/include"
          ln -sfn /usr/include/boost "${WASM_CI_DEPS}/include/boost"
          ln -sfn /usr/include/eigen3 "${WASM_CI_DEPS}/include/eigen3"
          cp -f dependencies/csound-ac/CsoundAC/version.h dependencies/csound/include/version.h
          emcmake cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEIGEN_ROOT="${WASM_CI_DEPS}" \
            -DBOOST_ROOT="${WASM_CI_DEPS}"
          cmake --build build-wasm --parallel "$(nproc)" --target package_wasm

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: csound-wasm
          path: csound-wasm-*.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: csound-wasm-*.zip
