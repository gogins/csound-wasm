name: build-and-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wasm:
    name: wasm
    runs-on: ubuntu-latest
    env:
      EMSCRIPTEN_ALLOW_NEWER_PYTHON: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            python3 \
            bison \
            flex \
            git \
            rsync \
            libeigen3-dev \
            libboost-dev

      - name: Prepare ccache
        run: |
          ccache --set-config=max_size=750M
          ccache --set-config=compression=true
          ccache --zero-stats || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-wasm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CsoundAC/**', 'build-wasm.sh', 'dependencies/csound/CMakeLists.txt') }}
          restore-keys: |
            ccache-wasm-${{ runner.os }}-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Pinned (not "latest") so the emsdk action cache and ccache stay warm across runs.
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Configure and build
        run: |
          set -euo pipefail
          cp -f dependencies/csound-ac/CsoundAC/version.h dependencies/csound/include/version.h
          emcmake cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DEIGEN_ROOT=/usr \
            -DBOOST_ROOT=/usr
          cmake --build build-wasm --parallel "$(nproc)" --target package_wasm
          ccache --show-stats || true

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: csound-wasm
          path: csound-wasm-*.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: csound-wasm-*.zip
